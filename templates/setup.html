{% extends 'base.html' %}
{% block title %}Setup Your Shop - Tailor Management System{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card p-4">
        <div class="text-center mb-4">
            <i class="ph ph-storefront" style="font-size: 3rem; color: var(--primary-color);"></i>
            <h2 class="mt-2 text-primary">Let's Setup Your Shop</h2>
            <p class="text-muted">Enter your details to generate beautiful invoices and manage your business.</p>
        </div>

        <form method="POST" action="{{ url_for('setup') }}">
            
            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label class="form-label">Owner Name *</label>
                    <input type="text" name="owner_name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number *</label>
                    <input type="text" name="phone" class="form-control" required placeholder="+12 34567890">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Shop Name *</label>
                <input type="text" name="shop_name" class="form-control" required placeholder="John's Custom Tailoring">
            </div>

            <div class="form-group">
                <label class="form-label">Shop Address *</label>
                <textarea name="shop_address" class="form-control" rows="3" required placeholder="123 Main Street, City..."></textarea>
            </div>

            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label class="form-label">Currency Symbol</label>
                    <select name="currency_symbol" class="form-control">
                        <option value="$">US Dollar ($)</option>
                        <option value="₹">Indian Rupee (₹)</option>
                        <option value="£">British Pound (£)</option>
                        <option value="€">Euro (€)</option>
                        <option value="₦">Nigerian Naira (₦)</option>
                        <option value="PKR">Pakistani Rupee (PKR)</option>
                        <option value="BD">BDT (৳)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Tax %</label>
                    <input type="number" step="0.01" name="tax_settings" class="form-control" placeholder="0.00" value="0.00">
                </div>
            </div>

            <button class="btn btn-primary btn-block mt-4" type="submit">Complete Setup <i class="ph ph-arrow-right"></i></button>
        </form>
    </div>
</div>
{% endblock %}
