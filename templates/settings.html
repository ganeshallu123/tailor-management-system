{% extends 'base.html' %}
{% block title %}Shop Settings - Tailor Management System{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card p-4">
        <div class="text-center mb-4">
            <i class="ph ph-gear" style="font-size: 3rem; color: var(--primary-color);"></i>
            <h2 class="mt-2 text-primary">Shop Settings</h2>
            <p class="text-muted">Update your profile and business details.</p>
        </div>

        <form method="POST" action="{{ url_for('settings') }}">
            
            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label class="form-label">Owner Name *</label>
                    <input type="text" name="owner_name" class="form-control" required value="{{ current_user.owner_name }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number *</label>
                    <input type="text" name="phone" class="form-control" required value="{{ current_user.phone }}">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Shop Name *</label>
                <input type="text" name="shop_name" class="form-control" required value="{{ current_user.shop_name }}">
            </div>

            <div class="form-group">
                <label class="form-label">Shop Address *</label>
                <textarea name="shop_address" class="form-control" rows="3" required>{{ current_user.shop_address }}</textarea>
            </div>

            <div class="grid grid-cols-2">
                <div class="form-group">
                    <label class="form-label">Currency Symbol</label>
                    <select name="currency_symbol" class="form-control" style="color: var(--text-main);">
                        <option value="₹" {% if current_user.currency_symbol == '₹' %}selected{% endif %}>Indian Rupee (₹)</option>
                        <option value="$" {% if current_user.currency_symbol == '$' %}selected{% endif %}>US Dollar ($)</option>
                        <option value="£" {% if current_user.currency_symbol == '£' %}selected{% endif %}>British Pound (£)</option>
                        <option value="€" {% if current_user.currency_symbol == '€' %}selected{% endif %}>Euro (€)</option>
                        <option value="₦" {% if current_user.currency_symbol == '₦' %}selected{% endif %}>Nigerian Naira (₦)</option>
                        <option value="PKR" {% if current_user.currency_symbol == 'PKR' %}selected{% endif %}>Pakistani Rupee (PKR)</option>
                        <option value="BD" {% if current_user.currency_symbol == 'BD' %}selected{% endif %}>BDT (৳)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Tax %</label>
                    <input type="number" step="0.01" name="tax_settings" class="form-control" value="{{ current_user.tax_settings }}">
                </div>
            </div>

            <button class="btn btn-primary btn-block mt-4" type="submit"><i class="ph ph-floppy-disk"></i> Save Settings</button>
        </form>
    </div>
</div>
{% endblock %}
